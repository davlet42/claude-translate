name: Publish npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test

      - name: Publish claude-translate
        # Prefer OIDC trusted publishing (--provenance). Token kept as fallback
        # for classic auth; GAT tokens can report success without a public tarball.
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Publish npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test

      - name: Publish claude-translate
        # --provenance for attestations. If classic NPM_TOKEN starts ghost-publishing
        # again (CI + without a public tarball), switch the package to Trusted Publishing
        # on npmjs.com and drop NODE_AUTH_TOKEN.
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

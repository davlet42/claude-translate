enabled: true

min_cyrillic_ratio: 0.15
min_chars_to_translate: 120

translator:
  # Default: Claude subscription via `claude -p --safe-mode` — no separate API key.
  provider: claude-cli
  # Cheap translate tier only (your main Claude Code model is unchanged).
  model: claude-haiku-4-5
  # When the primary tier hits usage limits, doc cache retries with this model.
  doc_fallback_model: claude-sonnet-5
  # CI/headless only:
  # provider: openai
  # model: gpt-5-nano

response:
  user_language: ru
  # CLI wrapper (claude-translate agent) — skipped automatically on quota exhaustion.
  prompt_translate: true
  back_translate: true
  # Display-only RU translation of assistant replies (MessageDisplay hook):
  # the transcript stays English (cheap for later turns), your screen shows
  # Russian. Adds ~1-4s Haiku latency per displayed English reply.
  display_back_translate: false
  display_min_chars: 80
  display_max_chars: 12000
  # Ask the model to reply in English even to Russian prompts (SessionStart
  # instruction) — saves ~2x on output tokens. Only applied when
  # display_back_translate is also true, so you still read Russian.
  english_replies: false

cache:
  location: global
  dir: ~/.claude/translate-proxy/cache
  # Orphan GC: caches of deleted/renamed docs are removed after the source
  # has been missing this many days (branch switches stay safe). 0 disables.
  gc_orphan_days: 30
  # Reuse fresh entries from a sibling install (cursor-translate) before
  # re-translating. Override candidates: CLAUDE_TRANSLATE_SIBLING_HOMES.
  share_siblings: true
  lazy_read_max_chars: 50000
  lazy_read_max_chunks: 3
  lazy_read_hints: true
  incremental: section

glossary:
  file: ~/.claude/translate-proxy/glossary.yaml
  merge_project: true
  project_file: .claude/claude-translate-glossary.yaml

# Optional global translate rules (see also project CLAUDE.md § claude-translate):
# rules_file: ~/.claude/translate-proxy/claude-translate-rules.md

metrics:
  log_path: ~/.claude/translate-proxy/metrics.jsonl

safety:
  fail_open: true
  max_latency_ms: 2500

hooks:
  audit_enabled: true
  lazy_read_timeout_sec: 600
  # path    — PreToolUse rewrites file_path to the EN cache (default).
  # content — PostToolUse replaces the Read result text instead; the path the
  #           model sees stays the original (no cache-path confusion, but Edit
  #           old_string matching against the file will not line up).
  lazy_read_mode: path
